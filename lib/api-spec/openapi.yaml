openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ZMB Stack Portfolio API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Portfolio projects
  - name: github
    description: GitHub integration
  - name: blog
    description: Blog posts
  - name: contact
    description: Contact messages

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all portfolio projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /projects/{slug}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single project by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /github/repos:
    get:
      operationId: listGithubRepos
      tags: [github]
      summary: List GitHub repo metadata for configured private repos
      responses:
        "200":
          description: GitHub repo metadata list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GitHubRepoMeta"
        "503":
          description: GitHub token not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blog:
    get:
      operationId: listBlogPosts
      tags: [blog]
      summary: List blog posts
      responses:
        "200":
          description: List of blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"

  /blog/{slug}:
    get:
      operationId: getBlogPost
      tags: [blog]
      summary: Get a single blog post
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contact:
    post:
      operationId: sendContactMessage
      tags: [contact]
      summary: Send a contact message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Message saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessage"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ProjectChallenge:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        solution:
          type: string
      required:
        - title
        - description
        - solution

    Project:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        tagline:
          type: string
        description:
          type: string
        problem:
          type: string
        technologies:
          type: array
          items:
            type: string
        architecture:
          type: ["string", "null"]
        features:
          type: array
          items:
            type: string
        challenges:
          type: array
          items:
            $ref: "#/components/schemas/ProjectChallenge"
        status:
          type: string
          enum: [completed, in-progress, archived]
        role:
          type: string
        duration:
          type: string
        screenshots:
          type: array
          items:
            type: string
        videoUrl:
          type: ["string", "null"]
        githubRepo:
          type: ["string", "null"]
        featured:
          type: boolean
        order:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - slug
        - name
        - tagline
        - description
        - problem
        - technologies
        - features
        - challenges
        - status
        - role
        - duration
        - screenshots
        - featured
        - order
        - createdAt

    GitHubRepoMeta:
      type: object
      properties:
        name:
          type: string
        fullName:
          type: string
        description:
          type: ["string", "null"]
        language:
          type: ["string", "null"]
        updatedAt:
          type: string
        topics:
          type: array
          items:
            type: string
        visibility:
          type: string
      required:
        - name
        - fullName
        - updatedAt
        - topics
        - visibility

    BlogPost:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        excerpt:
          type: string
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        readingTime:
          type: integer
        publishedAt:
          type: ["string", "null"]
        published:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - slug
        - title
        - excerpt
        - content
        - tags
        - readingTime
        - published
        - createdAt

    ContactInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
        subject:
          type: string
          minLength: 3
        message:
          type: string
          minLength: 10
      required:
        - name
        - email
        - subject
        - message

    ContactMessage:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        subject:
          type: string
        message:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - subject
        - message
        - createdAt
